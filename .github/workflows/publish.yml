name: Publish to PyPI

# Publishes divvy-backtest when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token needed once the project is
# configured on PyPI as a trusted publisher for this repo/workflow.
on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for trusted publishing
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
